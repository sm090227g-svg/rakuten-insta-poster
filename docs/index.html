<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のおすすめ商品</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
    background: #f7f7f7;
    color: #333;
    margin: 0;
    padding: 24px 16px 60px;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #fff;
    max-width: 420px;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: #eee;
  }
  .card-body {
    padding: 20px;
  }
  .badge {
    display: inline-block;
    background: #bf0000;
    color: #fff;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 17px;
    line-height: 1.5;
    margin: 0 0 10px;
  }
  .price {
    font-size: 22px;
    font-weight: bold;
    color: #bf0000;
    margin: 0 0 16px;
  }
  .price span {
    font-size: 14px;
    font-weight: normal;
    color: #666;
  }
  a.buy-button {
    display: block;
    text-align: center;
    background: #bf0000;
    color: #fff;
    text-decoration: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 16px;
  }
  a.buy-button:active {
    opacity: 0.8;
  }
  .updated {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 12px;
  }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="loading">読み込み中...</div>
</div>

<script>
fetch('./product-data.json?t=' + Date.now())
  .then(res => res.json())
  .then(data => {
    const card = document.getElementById('card');
    card.innerHTML = `
      <img src="${data.image_url}" alt="${data.name}">
      <div class="card-body">
        <span class="badge">本日のおすすめ</span>
        <h1>${data.name}</h1>
        <p class="price">${data.price.toLocaleString()}円 <span>(税込・参考価格)</span></p>
        <a class="buy-button" href="${data.url}" target="_blank" rel="noopener">楽天市場で見る →</a>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend',
      `<p class="updated">最終更新: ${data.updated_at}</p>`);
  })
  .catch(() => {
    document.getElementById('card').innerHTML =
      '<div class="loading">商品情報を読み込めませんでした</div>';
  });
</script>

</body>
</html>
