name: 楽天商品Instagram自動投稿

on:
  schedule:
    # 12:00 JST = 03:00 UTC(お昼休み、視聴が伸びやすい時間帯)
    - cron: "0 3 * * *"
    # 20:00 JST = 11:00 UTC(夕食後、視聴が伸びやすい時間帯)
    - cron: "0 11 * * *"
  workflow_dispatch: {} # 「Actions」タブから手動実行もできるようにする

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 投稿スクリプトを実行
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_SITE_URL: ${{ secrets.RAKUTEN_SITE_URL }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_to_instagram.py

      - name: ランディングページの更新をリポジトリに反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/product-data.json docs/products.json
          git diff --staged --quiet || git commit -m "ランディングページを更新"
          git push
