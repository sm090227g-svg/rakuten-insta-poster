name: 楽天商品Instagram自動投稿

on:
  schedule:
    # 19:00 JST = 10:00 UTC(日本時間 午後7時)
    - cron: "0 10 * * *"
  workflow_dispatch: {} # 「Actions」タブから手動実行もできるようにする

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 投稿スクリプトを実行
      env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_SITE_URL: ${{ secrets.RAKUTEN_SITE_URL }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          run: python post_to_instagram.py
