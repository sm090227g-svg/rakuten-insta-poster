name: 楽天商品Instagramリール自動投稿

on:
  schedule:
    # 19:00 JST = 10:00 UTC(日本時間 午後7時)
    - cron: "0 10 * * *"
  workflow_dispatch: {} # 「Actions」タブから手動実行もできるようにする

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 動画作成に必要なツールをインストール
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 商品を取得してリール動画を作成
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_SITE_URL: ${{ secrets.RAKUTEN_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_content.py

      - name: 動画をリポジトリに反映(公開用)
        id: commit_video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/reel-video.mp4 docs/reel-card.png
          git diff --staged --quiet || git commit -m "リール動画を更新"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: 動画が公開されるまで少し待つ
        run: sleep 15

      - name: Instagramにリールを投稿
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          VIDEO_COMMIT_SHA: ${{ steps.commit_video.outputs.sha }}
        run: python publish_reel.py

      - name: ランディングページの更新をリポジトリに反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/product-data.json
          git diff --staged --quiet || git commit -m "ランディングページを更新"
          git push
